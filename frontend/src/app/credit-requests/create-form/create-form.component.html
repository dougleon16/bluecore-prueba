<form [formGroup]="form" (ngSubmit)="submit()" class="grid sm:grid-cols-3 gap-4">
  @if (errorMessage()) {
    <p class="sm:col-span-3 text-sm text-red-500 font-mono">{{ errorMessage() }}</p>
  }

  <label class="block">
    <span class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground"
      >Cédula</span
    >
    <div class="mt-1.5">
      <input
        formControlName="cedula"
        type="text"
        placeholder="0-0000000-0"
        [class]="
          'input' +
          (form.get('cedula')?.invalid && form.get('cedula')?.touched ? ' input--error' : '')
        "
      />
      @if (form.get('cedula')?.invalid && form.get('cedula')?.touched) {
        <p class="mt-1 text-xs text-red-500 font-mono">La cédula es obligatoria.</p>
      }
    </div>
  </label>

  <label class="block">
    <span class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground"
      >Monto (USD)</span
    >
    <div class="mt-1.5">
      <input
        formControlName="amount"
        type="number"
        placeholder="500 – 50,000"
        [class]="
          'input' +
          (form.get('amount')?.invalid && form.get('amount')?.touched ? ' input--error' : '')
        "
      />
      @if (form.get('amount')?.invalid && form.get('amount')?.touched) {
        <p class="mt-1 text-xs text-red-500 font-mono">El monto debe estar entre $500 y $50,000.</p>
      }
    </div>
  </label>

  <label class="block">
    <span class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground"
      >Plazo (meses)</span
    >
    <div class="mt-1.5">
      <input
        formControlName="termMonths"
        type="number"
        placeholder="6 – 60"
        [class]="
          'input' +
          (form.get('termMonths')?.invalid && form.get('termMonths')?.touched
            ? ' input--error'
            : '')
        "
      />
      @if (form.get('termMonths')?.invalid && form.get('termMonths')?.touched) {
        <p class="mt-1 text-xs text-red-500 font-mono">El plazo debe estar entre 6 y 60 meses.</p>
      }
    </div>
  </label>

  <div class="sm:col-span-3 flex justify-end">
    <button
      type="submit"
      class="rounded-md bg-ink text-cream font-medium text-sm px-5 py-2.5 hover:bg-ink/90 transition disabled:opacity-60"
      [disabled]="loading()"
    >
      {{ loading() ? 'Guardando…' : 'Crear solicitud' }}
    </button>
  </div>
</form>

<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  role="dialog"
  aria-modal="true"
  aria-labelledby="reject-modal-title"
>
  <div class="absolute inset-0 bg-ink/50 backdrop-blur-sm" (click)="cancel()"></div>

  <div class="relative w-full max-w-md rounded-xl border bg-card shadow-xl">
    <div class="flex items-start justify-between p-6 border-b">
      <div>
        <p class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground">Acción requerida</p>
        <h2 id="reject-modal-title" class="mt-1 font-display text-2xl">Rechazar solicitud</h2>
      </div>
      <button
        type="button"
        class="ml-4 mt-1 text-muted-foreground hover:text-foreground transition"
        aria-label="Cerrar"
        (click)="cancel()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="p-6 space-y-4">
      <p class="text-sm text-muted-foreground">
        Indica el motivo del rechazo. Este comentario quedará registrado en la solicitud.
      </p>

      <label class="block">
        <span class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground">Motivo</span>
        <div class="mt-1.5">
          <textarea
            formControlName="comment"
            rows="3"
            placeholder="Ej: Documentación incompleta, historial crediticio insuficiente…"
            [class]="'input resize-none' + (form.get('comment')?.invalid && form.get('comment')?.touched ? ' input--error' : '')"
          ></textarea>
          @if (form.get('comment')?.touched) {
            @if (form.get('comment')?.hasError('required')) {
              <p class="mt-1 text-xs text-red-500 font-mono">El motivo es obligatorio.</p>
            } @else if (form.get('comment')?.hasError('minlength')) {
              <p class="mt-1 text-xs text-red-500 font-mono">Mínimo 5 caracteres.</p>
            }
          }
        </div>
      </label>

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          class="rounded-md border px-4 py-2 text-sm font-medium hover:bg-muted/50 transition"
          (click)="cancel()"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="rounded-md bg-destructive text-destructive-foreground px-4 py-2 text-sm font-medium hover:bg-destructive/90 transition"
        >
          Confirmar rechazo
        </button>
      </div>
    </form>
  </div>
</div>

<div class="grid grid-cols-3 gap-3">
  <div class="rounded-xl border bg-card px-4 py-3">
    <div class="flex items-center gap-1.5">
      <span class="h-1.5 w-1.5 rounded-full bg-warning"></span>
      <p class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground">
        Pendientes
      </p>
    </div>
    <p class="mt-1 font-display text-3xl tabular-nums">{{ pendingCount() }}</p>
  </div>
  <div class="rounded-xl border bg-card px-4 py-3">
    <div class="flex items-center gap-1.5">
      <span class="h-1.5 w-1.5 rounded-full bg-success"></span>
      <p class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground">
        Aprobadas
      </p>
    </div>
    <p class="mt-1 font-display text-3xl tabular-nums">{{ approvedCount() }}</p>
  </div>
  <div class="rounded-xl border bg-card px-4 py-3">
    <div class="flex items-center gap-1.5">
      <span class="h-1.5 w-1.5 rounded-full bg-destructive"></span>
      <p class="font-mono text-[10px] uppercase tracking-widest text-muted-foreground">
        Rechazadas
      </p>
    </div>
    <p class="mt-1 font-display text-3xl tabular-nums">{{ rejectedCount() }}</p>
  </div>
</div>

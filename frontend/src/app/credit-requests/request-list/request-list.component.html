<div class="min-h-screen paper">
  <app-header [email]="currentUser?.email ?? null" [isDemoMode]="true" (logoutClick)="logout()" />

  <main class="mx-auto max-w-7xl px-6 py-10 space-y-10">
    <section class="grid lg:grid-cols-12 gap-6 items-end">
      <div class="lg:col-span-7">
        <p class="font-mono text-[11px] uppercase tracking-widest text-muted-foreground">Resumen</p>
        <h1 class="mt-2 font-display text-4xl sm:text-5xl leading-[1.05]">
          Solicitudes de <em class="text-accent not-italic">crédito</em> en curso.
        </h1>
        <p class="mt-3 text-sm text-muted-foreground max-w-lg">
          Revisa el estado de cada caso, aprueba o rechaza con un comentario y mantén un historial
          trazable de las decisiones.
        </p>
      </div>
      <div class="lg:col-span-5">
        <app-request-stats [requests]="requests()" />
      </div>
    </section>

    <section class="rounded-xl border bg-card overflow-hidden">
      <button
        type="button"
        class="w-full flex items-center justify-between px-6 py-4 hover:bg-muted/50 transition"
        [class.border-b]="showCreateForm()"
        (click)="toggleCreateForm()"
      >
        <div class="flex items-center gap-3">
          <div class="h-8 w-8 rounded-md bg-accent/15 text-accent grid place-items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-plus h-4 w-4"
              aria-hidden="true"
            >
              <path d="M5 12h14"></path>
              <path d="M12 5v14"></path>
            </svg>
          </div>
          <div class="text-left">
            <p class="font-display text-lg leading-tight">Nueva solicitud</p>
            <p class="text-xs text-muted-foreground">
              Captura monto, plazo y cédula del solicitante.
            </p>
          </div>
        </div>
        <span class="font-mono text-[11px] uppercase tracking-widest text-muted-foreground">
          {{ showCreateForm() ? 'Cerrar' : 'Abrir' }}
        </span>
      </button>
      @if (showCreateForm()) {
        <div class="p-6">
          <app-create-form (created)="onRequestCreated($event)" />
        </div>
      }
    </section>

    @if (actionError()) {
      <p class="text-sm text-red-500 font-mono">{{ actionError() }}</p>
    }

    <app-request-table
      [requests]="requests()"
      [loading]="loading()"
      (filterChange)="onFilterChange($event)"
      (approve)="approve($event)"
      (reject)="confirmReject($event)"
    />

    <footer
      class="pt-6 pb-12 text-center font-mono text-[11px] uppercase tracking-widest text-muted-foreground"
    >
      Bluecore · Prueba técnica Full Stack
    </footer>
  </main>
</div>
